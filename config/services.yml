services:
  _defaults:
    public: true
    autowire: true
    autoconfigure: true

  # Services
  sc_verify_multishop.service.analyzer:
    class: ScVerifyMultishop\Service\AnalyzerService
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer.config:
    class: ScVerifyMultishop\Service\ConfigFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.diagnostics:
    class: ScVerifyMultishop\Service\DiagnosticsService
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'
      - '%kernel.project_dir%'
      - '@sc_verify_multishop.service.fixer.config'

  sc_verify_multishop.service.fixer.shop_group:
    class: ScVerifyMultishop\Service\ShopGroupFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer.carrier:
    class: ScVerifyMultishop\Service\CarrierFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer.product:
    class: ScVerifyMultishop\Service\ProductFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer.stock:
    class: ScVerifyMultishop\Service\StockFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer.content:
    class: ScVerifyMultishop\Service\ContentFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.fixer_dispatcher:
    class: ScVerifyMultishop\Service\FixerDispatcher
    arguments:
      - '@sc_verify_multishop.service.fixer.shop_group'
      - '@sc_verify_multishop.service.fixer.carrier'
      - '@sc_verify_multishop.service.fixer.product'
      - '@sc_verify_multishop.service.fixer.stock'
      - '@sc_verify_multishop.service.fixer.content'
      - '@sc_verify_multishop.service.fixer.config'

  sc_verify_multishop.service.diagnostic_registry:
    class: ScVerifyMultishop\Service\DiagnosticRegistry
    arguments:
      - '@sc_verify_multishop.service.analyzer'
      - '@sc_verify_multishop.service.diagnostics'

  # Controllers
  sc_verify_multishop.controller.dashboard:
    class: ScVerifyMultishop\Controller\Admin\DashboardController
    arguments:
      - '@sc_verify_multishop.service.diagnostic_registry'
    calls:
      - [setContainer, ['@service_container']]

  sc_verify_multishop.controller.diagnostic:
    class: ScVerifyMultishop\Controller\Admin\DiagnosticController
    arguments:
      - '@sc_verify_multishop.service.analyzer'
      - '@sc_verify_multishop.service.diagnostics'
    calls:
      - [setContainer, ['@service_container']]

  sc_verify_multishop.controller.fix:
    class: ScVerifyMultishop\Controller\Admin\FixController
    arguments:
      - '@sc_verify_multishop.service.fixer_dispatcher'
      - '@security.csrf.token_manager'
    calls:
      - [setContainer, ['@service_container']]

services:
  _defaults:
    public: true
    autowire: true
    autoconfigure: true

  # Checks - Payment
  sc_verify_multishop.check.payment_module_shop:
    class: ScVerifyMultishop\Service\Check\Payment\PaymentModuleShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.shipping_module_shop:
    class: ScVerifyMultishop\Service\Check\Payment\ShippingModuleShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.paypal_credential:
    class: ScVerifyMultishop\Service\Check\Payment\PaypalCredentialCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.stripe_credential:
    class: ScVerifyMultishop\Service\Check\Payment\StripeCredentialCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.colissimo_credential:
    class: ScVerifyMultishop\Service\Check\Payment\ColissimoCredentialCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.mondial_relay_credential:
    class: ScVerifyMultishop\Service\Check\Payment\MondialRelayCredentialCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  # Checks - Products & Images
  sc_verify_multishop.check.product_lang:
    class: ScVerifyMultishop\Service\Check\Product\ProductLangCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.product_shop:
    class: ScVerifyMultishop\Service\Check\Product\ProductShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.product_attribute_shop:
    class: ScVerifyMultishop\Service\Check\Product\ProductAttributeShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.default_attribute_shop:
    class: ScVerifyMultishop\Service\Check\Product\DefaultAttributeShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.attribute_shop:
    class: ScVerifyMultishop\Service\Check\Product\AttributeShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.category_lang:
    class: ScVerifyMultishop\Service\Check\Product\CategoryLangCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.category_shop:
    class: ScVerifyMultishop\Service\Check\Product\CategoryShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.specific_price_scope:
    class: ScVerifyMultishop\Service\Check\Product\SpecificPriceScopeCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.feature_shop:
    class: ScVerifyMultishop\Service\Check\Product\FeatureShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.price_anomaly:
    class: ScVerifyMultishop\Service\Check\Product\PriceAnomalyCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.check.image_shop:
    class: ScVerifyMultishop\Service\Check\Product\ImageShopCheck
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'

  sc_verify_multishop.service.check_registry:
    class: ScVerifyMultishop\Service\Check\CheckRegistry
    arguments:
      -
        - '@sc_verify_multishop.check.payment_module_shop'
        - '@sc_verify_multishop.check.shipping_module_shop'
        - '@sc_verify_multishop.check.paypal_credential'
        - '@sc_verify_multishop.check.stripe_credential'
        - '@sc_verify_multishop.check.colissimo_credential'
        - '@sc_verify_multishop.check.mondial_relay_credential'
        - '@sc_verify_multishop.check.product_lang'
        - '@sc_verify_multishop.check.product_shop'
        - '@sc_verify_multishop.check.product_attribute_shop'
        - '@sc_verify_multishop.check.default_attribute_shop'
        - '@sc_verify_multishop.check.attribute_shop'
        - '@sc_verify_multishop.check.category_lang'
        - '@sc_verify_multishop.check.category_shop'
        - '@sc_verify_multishop.check.specific_price_scope'
        - '@sc_verify_multishop.check.feature_shop'
        - '@sc_verify_multishop.check.price_anomaly'
        - '@sc_verify_multishop.check.image_shop'

  # Controllers
  sc_verify_multishop.controller.diagnostic:
    class: ScVerifyMultishop\Controller\Admin\DiagnosticController
    arguments:
      - '@sc_verify_multishop.service.check_registry'
    calls:
      - [setContainer, ['@service_container']]
    tags:
      - { name: 'controller.service_arguments' }
